<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vía Láctea Preview</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Inter, system-ui, sans-serif;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #panel {
      position: fixed;
      top: 14px;
      right: 14px;
      width: 290px;
      border-radius: 16px;
      background: rgba(8, 10, 20, 0.58);
      color: #eef1ff;
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      overflow: hidden;
      z-index: 20;
    }

    #panelHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      cursor: pointer;
      user-select: none;
    }

    #panelTitle {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    #panelToggle {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      background: rgba(255,255,255,0.08);
      font-size: 14px;
    }

    #panelBody {
      padding: 0 14px 14px 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    #panel.collapsed #panelBody {
      display: none;
    }

    .row {
      margin-top: 14px;
    }

    .rowHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 12px;
      color: #d9def7;
    }

    .value {
      color: #fff;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      appearance: none;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ffffff;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.10);
    }

    .checkRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: #d9def7;
      margin-top: 14px;
    }

    .hint {
      margin-top: 12px;
      font-size: 11px;
      line-height: 1.35;
      color: rgba(230,235,255,0.66);
    }
  </style>
</head>
<body>
  <canvas id="space"></canvas>

  <div id="panel">
    <div id="panelHeader">
      <div id="panelTitle">Vía Láctea</div>
      <div id="panelToggle">–</div>
    </div>
    <div id="panelBody">
      <div class="row">
        <div class="rowHeader">
          <span>Intensidad nebulosa</span>
          <span id="nebulaValue" class="value">0.55</span>
        </div>
        <input id="nebulaSlider" type="range" min="0" max="1.5" step="0.01" value="0.55" />
      </div>

      <div class="row">
        <div class="rowHeader">
          <span>Densidad estrellas</span>
          <span id="starsValue" class="value">1.75</span>
        </div>
        <input id="starsSlider" type="range" min="0.5" max="3.0" step="0.01" value="1.75" />
      </div>

      <div class="checkRow">
        <span>Efectos ocasionales</span>
        <input id="fxToggle" type="checkbox" checked />
      </div>

      <div class="hint">
        Esta versión parte de una base más estable: menos nebulosa, más estrellas, panel plegable y shader corregido.
      </div>
    </div>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById('space');
      const gl = canvas.getContext('webgl2', { alpha: false, antialias: true });
      if (!gl) {
        document.body.innerHTML = '<div style="color:white;padding:20px">WebGL2 no disponible</div>';
        return;
      }

      const panel = document.getElementById('panel');
      const panelHeader = document.getElementById('panelHeader');
      const panelToggle = document.getElementById('panelToggle');
      const nebulaSlider = document.getElementById('nebulaSlider');
      const starsSlider = document.getElementById('starsSlider');
      const fxToggle = document.getElementById('fxToggle');
      const nebulaValue = document.getElementById('nebulaValue');
      const starsValue = document.getElementById('starsValue');

      const settings = {
        nebula: 0.55,
        stars: 1.75,
        fx: 1.0
      };

      function syncUI() {
        nebulaValue.textContent = settings.nebula.toFixed(2);
        starsValue.textContent = settings.stars.toFixed(2);
        nebulaSlider.value = settings.nebula;
        starsSlider.value = settings.stars;
        fxToggle.checked = settings.fx > 0.5;
      }

      panelHeader.addEventListener('click', () => {
        panel.classList.toggle('collapsed');
        panelToggle.textContent = panel.classList.contains('collapsed') ? '+' : '–';
      });

      nebulaSlider.addEventListener('input', () => {
        settings.nebula = parseFloat(nebulaSlider.value);
        syncUI();
      });

      starsSlider.addEventListener('input', () => {
        settings.stars = parseFloat(starsSlider.value);
        syncUI();
      });

      fxToggle.addEventListener('change', () => {
        settings.fx = fxToggle.checked ? 1.0 : 0.0;
      });

      syncUI();

      function resize() {
        const dpr = Math.min(2, window.devicePixelRatio || 1);
        const w = Math.floor(innerWidth * dpr);
        const h = Math.floor(innerHeight * dpr);
        canvas.width = w;
        canvas.height = h;
        gl.viewport(0, 0, w, h);
      }
      window.addEventListener('resize', resize);
      resize();

      function compile(type, src) {
        const s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
          throw new Error(gl.getShaderInfoLog(s) || 'Shader compile error');
        }
        return s;
      }

      function program(vsSrc, fsSrc) {
        const p = gl.createProgram();
        gl.attachShader(p, compile(gl.VERTEX_SHADER, vsSrc));
        gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fsSrc));
        gl.linkProgram(p);
        if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
          throw new Error(gl.getProgramInfoLog(p) || 'Program link error');
        }
        return p;
      }

      function runSelfChecks(shaderSource) {
        const reservedWords = ['active'];
        const problems = [];
        for (const word of reservedWords) {
          const re = new RegExp('\\b' + word + '\\b');
          if (re.test(shaderSource)) {
            problems.push(word);
          }
        }
        if (problems.length) {
          console.warn('Posibles nombres conflictivos en shader:', problems.join(', '));
        }
      }

      const VS = `#version 300 es
      in vec2 aPos;
      out vec2 vUv;
      void main() {
        vUv = aPos * 0.5 + 0.5;
        gl_Position = vec4(aPos, 0.0, 1.0);
      }`;

      const FS = `#version 300 es
      precision highp float;

      in vec2 vUv;
      out vec4 o;

      uniform vec2 uRes;
      uniform float uTime;
      uniform float uNebula;
      uniform float uStars;
      uniform float uFx;

      float hash21(vec2 p) {
        p = fract(p * vec2(123.34, 456.21));
        p += dot(p, p + 45.32);
        return fract(p.x * p.y);
      }

      vec2 hash22(vec2 p) {
        float n = hash21(p);
        float m = hash21(p + 19.19);
        return vec2(n, m);
      }

      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);

        float a = hash21(i);
        float b = hash21(i + vec2(1.0, 0.0));
        float c = hash21(i + vec2(0.0, 1.0));
        float d = hash21(i + vec2(1.0, 1.0));

        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
      }

      float fbm(vec2 p) {
        float v = 0.0;
        float a = 0.5;
        mat2 m = mat2(1.6, -1.2, 1.2, 1.6);
        for (int i = 0; i < 5; i++) {
          v += a * noise(p);
          p = m * p;
          a *= 0.5;
        }
        return v;
      }

      mat2 rot(float a) {
        float c = cos(a), s = sin(a);
        return mat2(c, -s, s, c);
      }

      vec3 palette(float t) {
        vec3 a = vec3(0.02, 0.03, 0.07);
        vec3 b = vec3(0.07, 0.10, 0.22);
        vec3 c = vec3(0.26, 0.22, 0.46);
        vec3 d = vec3(0.95, 0.82, 0.58);
        return mix(mix(a, b, smoothstep(0.0, 0.55, t)), mix(c, d, smoothstep(0.6, 1.0, t)), t);
      }

      vec3 starField(vec2 uv, float scale, float threshold, float sizeMul, float seed) {
        vec2 p = uv * scale;
        vec2 id = floor(p);
        vec2 gv = fract(p) - 0.5;

        float h = hash21(id + seed);
        if (h < threshold) return vec3(0.0);

        vec2 off = (hash22(id + seed * 3.7) - 0.5) * 0.7;
        vec2 d = gv - off;
        float dist = length(d);

        float bright = hash21(id + seed * 7.1);
        float tw = 0.75 + 0.25 * sin(uTime * (1.2 + bright * 2.6) + bright * 20.0);

        float radius = mix(0.012, 0.030, bright) * sizeMul;
        float core = exp(-pow(dist / radius, 2.0) * 3.0);
        float halo = exp(-pow(dist / (radius * 4.2), 2.0) * 1.0) * 0.35;

        vec3 tint = mix(vec3(1.0, 0.94, 0.86), vec3(0.80, 0.88, 1.0), hash21(id + seed * 11.0));
        return tint * (core + halo) * tw;
      }

      vec3 brightStar(vec2 uv, float scale, float threshold, float seed) {
        vec2 p = uv * scale;
        vec2 id = floor(p);
        vec2 gv = fract(p) - 0.5;

        float h = hash21(id + seed);
        if (h < threshold) return vec3(0.0);

        vec2 off = (hash22(id + seed * 5.1) - 0.5) * 0.66;
        vec2 d = gv - off;
        float dist = length(d);
        float ang = atan(d.y, d.x);
        float rnd = hash21(id + seed * 8.7);

        float radius = mix(0.02, 0.05, rnd);
        float core = exp(-pow(dist / radius, 2.0) * 3.2);
        float halo = exp(-pow(dist / (radius * 5.0), 2.0) * 1.2) * 0.5;
        float spikes = pow(max(0.0, cos(ang * 4.0)), 18.0) * exp(-dist / (radius * 7.0)) * 0.32;
        float tw = 0.82 + 0.18 * sin(uTime * (1.0 + rnd * 1.8) + rnd * 28.0);

        vec3 tint = mix(vec3(1.0, 0.95, 0.88), vec3(0.84, 0.91, 1.0), rnd);
        return tint * (core * 1.8 + halo + spikes) * tw;
      }

      vec3 shootingStar(vec2 uv, float aspect) {
        float period = 12.0;
        float local = mod(uTime, period);
        float isActive = smoothstep(1.0, 1.25, local) * (1.0 - smoothstep(2.0, 2.6, local));
        if (isActive <= 0.0) return vec3(0.0);

        vec2 start = vec2(aspect * 1.1, 0.65);
        vec2 dir = normalize(vec2(-1.0, -0.28));
        float prog = clamp((local - 1.0) / 1.2, 0.0, 1.0);
        vec2 head = start + dir * prog * (aspect * 1.8);

        vec2 rel = uv - head;
        float along = dot(rel, -dir);
        vec2 closest = (-dir) * clamp(along, 0.0, 0.55);
        float perp = length(rel - closest);

        float trail = exp(-perp * 150.0) * exp(-along * 5.5) * step(0.0, along) * (1.0 - step(0.55, along));
        float headGlow = exp(-length(uv - head) * 95.0) * 2.0;
        return vec3(1.15, 1.05, 0.95) * (trail + headGlow) * isActive;
      }

      vec3 supernova(vec2 uv, float aspect) {
        float period = 26.0;
        float local = mod(uTime + 7.0, period);
        float isActive = smoothstep(4.0, 5.0, local) * (1.0 - smoothstep(8.0, 11.5, local));
        if (isActive <= 0.0) return vec3(0.0);

        vec2 pos = vec2(-aspect * 0.30, 0.18);
        vec2 dvec = uv - pos;
        float d = length(dvec);
        float ang = atan(dvec.y, dvec.x);
        float burst = clamp((local - 4.0) / 3.0, 0.0, 1.0);

        float core = exp(-pow(d / 0.035, 2.0) * 3.0) * (0.95 + 0.05 * sin(uTime * 16.0));
        float ringR = mix(0.02, 0.18, burst);
        float ring = exp(-pow((d - ringR) / 0.018, 2.0) * 8.0) * burst;
        float rays = pow(max(0.0, cos(ang * 6.0)), 14.0) * exp(-d / (0.12 + burst * 0.18)) * 0.5;

        return (vec3(1.45, 1.10, 0.80) * core * 1.6 + vec3(1.10, 0.78, 1.40) * ring + vec3(1.0) * rays * 0.8) * isActive;
      }

      void main() {
        vec2 uv = vUv * 2.0 - 1.0;
        uv.x *= uRes.x / uRes.y;
        float aspect = uRes.x / uRes.y;
        float r = length(uv);

        float t = uTime * 0.05;
        vec2 guv = rot(t) * uv;

        vec3 col = vec3(0.004, 0.006, 0.018);
        col += vec3(0.003, 0.004, 0.010) * (1.0 - smoothstep(0.0, 1.5, r));

        float band = exp(-pow(abs(guv.y * 0.88 + guv.x * 0.22), 2.0) * 3.0);
        vec2 corePos = guv - vec2(-0.18, 0.02);
        float core = exp(-dot(corePos, corePos) * 2.1);

        vec2 p1 = rot(0.22 + t * 0.55) * (guv * 1.75);
        vec2 p2 = rot(-0.30 + t * 0.24) * (guv * 2.5);
        float dust = pow(fbm(p1 * 1.8) * fbm(p2 * 1.0 + 17.0), 1.35);
        float fil = smoothstep(0.45, 0.82, fbm(guv * 5.2));

        float neb = band * (0.08 + 0.60 * dust) + core * 0.42;
        vec3 nebCol = palette(clamp(0.15 + neb * 0.95 + core * 0.20, 0.0, 1.0));
        col += nebCol * neb * 0.95 * uNebula;
        col += vec3(0.10, 0.09, 0.16) * fil * band * 0.06 * uNebula;

        float darkDust = smoothstep(0.38, 0.76, fbm(guv * 4.0 - vec2(0.0, t * 0.22))) * band;
        col *= 1.0 - darkDust * 0.18 * uNebula;

        float dn = smoothstep(0.5, 3.0, uStars);
        col += starField(uv, 120.0, mix(0.9984, 0.9956, dn), 1.0, 11.0);
        col += starField(uv, 200.0, mix(0.9990, 0.9964, dn), 0.85, 23.0);
        col += starField(uv, 300.0, mix(0.9993, 0.9971, dn), 0.70, 37.0);
        col += starField(uv + vec2(0.003, -0.001), 170.0, mix(0.9980, 0.9948, dn), 1.0, 51.0) * mix(1.0, 1.9, band);
        col += starField(uv + vec2(-0.002, 0.002), 260.0, mix(0.9988, 0.9960, dn), 0.82, 67.0) * mix(1.0, 1.9, band);
        col += brightStar(uv, 38.0, mix(0.9995, 0.9986, dn), 101.0);
        col += brightStar(uv, 62.0, mix(0.9997, 0.9990, dn), 151.0);

        float micro = hash21(floor(uv * 620.0));
        float microStars = smoothstep(mix(0.9997, 0.9989, dn), 1.0, micro) * (0.6 + 0.4 * sin(uTime * 1.7 + micro * 40.0));
        col += vec3(0.82, 0.86, 1.0) * microStars * mix(0.45, 1.05, band);

        if (uFx > 0.5) {
          col += shootingStar(uv, aspect) * 0.95;
          col += supernova(uv, aspect) * 0.85;
        }

        col += vec3(0.16, 0.13, 0.09) * pow(core, 1.8) * 0.16 * uNebula;

        float vign = 1.0 - smoothstep(0.35, 1.45, r);
        col *= max(vign, 0.0);

        col = 1.0 - exp(-col * 1.18);
        col = pow(col, vec3(0.95));

        o = vec4(col, 1.0);
      }`;

      runSelfChecks(FS);

      let prog;
      try {
        prog = program(VS, FS);
      } catch (err) {
        console.error(err);
        document.body.innerHTML = '<div style="color:white;padding:20px;white-space:pre-wrap">Shader error:\n' + String(err.message || err) + '</div>';
        return;
      }

      const vao = gl.createVertexArray();
      gl.bindVertexArray(vao);

      const vbo = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
        -1, -1,
         1, -1,
        -1,  1,
         1,  1
      ]), gl.STATIC_DRAW);

      const locPos = gl.getAttribLocation(prog, 'aPos');
      gl.enableVertexAttribArray(locPos);
      gl.vertexAttribPointer(locPos, 2, gl.FLOAT, false, 0, 0);
      gl.bindVertexArray(null);

      const uResLoc = gl.getUniformLocation(prog, 'uRes');
      const uTimeLoc = gl.getUniformLocation(prog, 'uTime');
      const uNebulaLoc = gl.getUniformLocation(prog, 'uNebula');
      const uStarsLoc = gl.getUniformLocation(prog, 'uStars');
      const uFxLoc = gl.getUniformLocation(prog, 'uFx');

      const t0 = performance.now();

      function frame(now) {
        const time = (now - t0) / 1000;

        const dpr = Math.min(2, window.devicePixelRatio || 1);
        const w = Math.floor(innerWidth * dpr);
        const h = Math.floor(innerHeight * dpr);
        if (canvas.width !== w || canvas.height !== h) resize();

        gl.useProgram(prog);
        gl.bindVertexArray(vao);
        gl.uniform2f(uResLoc, canvas.width, canvas.height);
        gl.uniform1f(uTimeLoc, time);
        gl.uniform1f(uNebulaLoc, settings.nebula);
        gl.uniform1f(uStarsLoc, settings.stars);
        gl.uniform1f(uFxLoc, settings.fx);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        gl.bindVertexArray(null);

        requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
