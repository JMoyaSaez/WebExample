<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Galaxia</title>

<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000}
canvas{width:100vw;height:100vh;display:block}

#uiToggle{
  position:fixed;
  top:15px;
  right:15px;
  color:#aaa;
  cursor:pointer;
  font-size:18px;
  opacity:0.5;
}
#uiToggle:hover{opacity:1}

#panel{
  position:fixed;
  top:50px;
  right:15px;
  background:rgba(0,0,0,0.6);
  padding:12px;
  border-radius:10px;
  display:none;
  color:#ccc;
  font-size:12px;
  backdrop-filter: blur(6px);
}
#panel label{display:block;margin-top:6px}
#panel input{width:140px}
</style>
</head>

<body>

<canvas id="space"></canvas>

<div id="uiToggle">⚙</div>

<div id="panel">
  <label>Rotación</label>
  <input type="range" id="rot" min="0" max="6.28" step="0.01">

  <label>Velocidad giro</label>
  <input type="range" id="speed" min="-2" max="2" step="0.01" value="0.1">

  <label>Inclinación</label>
  <input type="range" id="tilt" min="-0.8" max="0.8" step="0.01">

  <label>Zoom</label>
  <input type="range" id="zoom" min="0.6" max="1.8" step="0.01">
</div>

<script>
(() => {

const canvas = document.getElementById("space");
const gl = canvas.getContext("webgl2",{alpha:false,antialias:true});
if(!gl) return;

function resize(){
  const dpr = Math.min(2,window.devicePixelRatio||1);
  canvas.width = innerWidth*dpr;
  canvas.height = innerHeight*dpr;
  gl.viewport(0,0,canvas.width,canvas.height);
}
window.addEventListener("resize",resize);
resize();

function compile(type,src){
  const s=gl.createShader(type);
  gl.shaderSource(s,src);
  gl.compileShader(s);
  return s;
}

function program(vs,fs){
  const p=gl.createProgram();
  gl.attachShader(p,compile(gl.VERTEX_SHADER,vs));
  gl.attachShader(p,compile(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(p);
  return p;
}

const VS=`#version 300 es
in vec2 aPos;
out vec2 vUv;
void main(){
  vUv = aPos*0.5+0.5;
  gl_Position = vec4(aPos,0.0,1.0);
}`;

const FS=`#version 300 es
precision highp float;
in vec2 vUv;
out vec4 o;

uniform vec2 uRes;
uniform float uTime;

uniform float uRot;
uniform float uTilt;
uniform float uZoom;
uniform float uSpeed;

float hash21(vec2 p){
  p=fract(p*vec2(123.34,456.21));
  p+=dot(p,p+45.32);
  return fract(p.x*p.y);
}

float noise(vec2 p){
  vec2 i=floor(p);
  vec2 f=fract(p);
  float a=hash21(i);
  float b=hash21(i+vec2(1,0));
  float c=hash21(i+vec2(0,1));
  float d=hash21(i+vec2(1,1));
  vec2 u=f*f*(3.0-2.0*f);
  return mix(a,b,u.x)+(c-a)*u.y*(1.0-u.x)+(d-b)*u.x*u.y;
}

float fbm(vec2 p){
  float v=0.0;
  float a=0.5;
  mat2 m=mat2(1.6,-1.2,1.2,1.6);
  for(int i=0;i<5;i++){
    v+=a*noise(p);
    p=m*p;
    a*=0.5;
  }
  return v;
}

mat2 rot(float a){
  float c=cos(a),s=sin(a);
  return mat2(c,-s,s,c);
}

void main(){

  vec2 uv=vUv*2.0-1.0;
  uv.x*=uRes.x/uRes.y;

  uv *= uZoom;

  float r = length(uv);

  // 🌌 rotación diferencial + torsión
  float speedFactor = pow(r, 0.7);
  float dynamicRot = uRot + uTime * uSpeed * mix(0.2, 1.2, speedFactor);

  uv = rot(dynamicRot) * uv;

  float twist = r * 0.8;
  uv = rot(twist) * uv;

  uv.y += uTilt;

  vec3 col=vec3(0.01,0.015,0.03);

  float band=exp(-pow(abs(uv.y*0.85+uv.x*0.25),2.0)*2.2);

  float core=exp(-r*r*1.5);

  vec2 p=uv*1.6;
  float dust=fbm(p+fbm(p*0.5));
  dust=smoothstep(0.3,0.8,dust);

  float neb=band*(0.2+0.8*dust);

  vec3 nebCol=mix(
    vec3(0.08,0.12,0.25),
    vec3(0.4,0.5,0.9),
    dust
  );

  nebCol+=core*vec3(0.8,0.7,0.5)*0.2;

  col+=nebCol*neb;

  vec2 st=uv*220.0;
  float h=hash21(floor(st));
  float star=smoothstep(0.995,1.0,h);
  star*=0.6+0.4*sin(uTime*2.0+h*6.28);

  col+=vec3(1.2,1.15,1.05)*star*1.5;

  float vign=smoothstep(1.2,0.2,r);
  col*=vign;

  col=1.0-exp(-col*1.3);

  o=vec4(col,1.0);
}
`;

const prog=program(VS,FS);

const vao=gl.createVertexArray();
gl.bindVertexArray(vao);

const vbo=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,vbo);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

const loc=gl.getAttribLocation(prog,"aPos");
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

const uRes=gl.getUniformLocation(prog,"uRes");
const uTime=gl.getUniformLocation(prog,"uTime");
const uRot=gl.getUniformLocation(prog,"uRot");
const uTilt=gl.getUniformLocation(prog,"uTilt");
const uZoom=gl.getUniformLocation(prog,"uZoom");
const uSpeed=gl.getUniformLocation(prog,"uSpeed");

let params={rot:0,tilt:0,zoom:1,speed:0.1};

document.getElementById("uiToggle").onclick=()=>{
  const p=document.getElementById("panel");
  p.style.display=p.style.display==="none"?"block":"none";
};

["rot","tilt","zoom","speed"].forEach(id=>{
  document.getElementById(id).oninput=e=>{
    params[id]=parseFloat(e.target.value);
  };
});

let t0=performance.now();

function frame(now){
  let t=(now-t0)/1000;

  resize();

  gl.useProgram(prog);
  gl.bindVertexArray(vao);

  gl.uniform2f(uRes,canvas.width,canvas.height);
  gl.uniform1f(uTime,t);

  gl.uniform1f(uRot,params.rot);
  gl.uniform1f(uTilt,params.tilt);
  gl.uniform1f(uZoom,params.zoom);
  gl.uniform1f(uSpeed,params.speed);

  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);

})();
</script>

</body>
</html>
