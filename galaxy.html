<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Galaxia</title>

<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000}
canvas{width:100vw;height:100vh;display:block}

#uiToggle{
  position:fixed;
  top:15px;
  right:15px;
  color:#aaa;
  cursor:pointer;
  font-size:18px;
  opacity:0.5;
  user-select:none;
}
#uiToggle:hover{opacity:1}

#panel{
  position:fixed;
  top:50px;
  right:15px;
  background:rgba(0,0,0,0.6);
  padding:12px;
  border-radius:10px;
  display:none;
  color:#ccc;
  font-size:12px;
  backdrop-filter: blur(6px);
  min-width:180px;
}
#panel label{display:block;margin-top:8px}
#panel input{width:160px}
#panel .value{
  font-size:11px;
  color:#888;
  margin-top:2px;
}
</style>
</head>

<body>

<canvas id="space"></canvas>

<div id="uiToggle">⚙</div>

<div id="panel">
  <label>Rotación base</label>
  <input type="range" id="rot" min="0" max="6.28" step="0.01" value="0">
  <div class="value" id="rotVal">0.00</div>

  <label>Velocidad giro</label>
  <input type="range" id="speed" min="-0.08" max="0.08" step="0.001" value="0.015">
  <div class="value" id="speedVal">0.015</div>

  <label>Inclinación</label>
  <input type="range" id="tilt" min="-0.22" max="0.22" step="0.01" value="0">
  <div class="value" id="tiltVal">0.00</div>

  <label>Zoom</label>
  <input type="range" id="zoom" min="0.88" max="1.22" step="0.01" value="1.00">
  <div class="value" id="zoomVal">1.00</div>
</div>

<script>
(() => {

const canvas = document.getElementById("space");
const gl = canvas.getContext("webgl2", { alpha:false, antialias:true });
if(!gl) return;

function resize(){
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  canvas.width = Math.floor(innerWidth * dpr);
  canvas.height = Math.floor(innerHeight * dpr);
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener("resize", resize);
resize();

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
    console.error(gl.getShaderInfoLog(s));
  }
  return s;
}

function program(vs, fs){
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, vs));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p, gl.LINK_STATUS)){
    console.error(gl.getProgramInfoLog(p));
  }
  return p;
}

const VS = `#version 300 es
in vec2 aPos;
out vec2 vUv;
void main(){
  vUv = aPos * 0.5 + 0.5;
  gl_Position = vec4(aPos, 0.0, 1.0);
}`;

const FS = `#version 300 es
precision highp float;
in vec2 vUv;
out vec4 o;

uniform vec2 uRes;
uniform float uTime;
uniform float uRot;
uniform float uTilt;
uniform float uZoom;
uniform float uSpeed;

float hash11(float p){
  p = fract(p * 0.1031);
  p *= p + 33.33;
  p *= p + p;
  return fract(p);
}

vec2 hash21f(float p){
  vec3 p3 = fract(vec3(p) * vec3(0.1031, 0.1030, 0.0973));
  p3 += dot(p3, p3.yzx + 33.33);
  return fract((p3.xx + p3.yz) * p3.zy);
}

float hash21(vec2 p){
  p = fract(p * vec2(123.34, 456.21));
  p += dot(p, p + 45.32);
  return fract(p.x * p.y);
}

float noise(vec2 p){
  vec2 i = floor(p);
  vec2 f = fract(p);
  float a = hash21(i);
  float b = hash21(i + vec2(1.0, 0.0));
  float c = hash21(i + vec2(0.0, 1.0));
  float d = hash21(i + vec2(1.0, 1.0));
  vec2 u = f * f * (3.0 - 2.0 * f);
  return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
}

float fbm(vec2 p){
  float v = 0.0;
  float a = 0.5;
  mat2 m = mat2(1.6, -1.2, 1.2, 1.6);
  for(int i = 0; i < 5; i++){
    v += a * noise(p);
    p = m * p;
    a *= 0.5;
  }
  return v;
}

mat2 rot(float a){
  float c = cos(a), s = sin(a);
  return mat2(c, -s, s, c);
}

float glowCircle(vec2 uv, vec2 p, float r, float blur){
  float d = length(uv - p);
  return exp(-pow(max(d - r, 0.0) / max(blur, 0.0001), 2.0));
}

float ring(vec2 uv, vec2 p, float radius, float width){
  float d = abs(length(uv - p) - radius);
  return exp(-pow(d / max(width, 0.0001), 2.0));
}

float segmentGlow(vec2 p, vec2 a, vec2 b, float thickness){
  vec2 pa = p - a;
  vec2 ba = b - a;
  float denom = max(dot(ba, ba), 0.0001);
  float h = clamp(dot(pa, ba) / denom, 0.0, 1.0);
  float d = length(pa - ba * h);
  return exp(-pow(d / thickness, 2.0));
}

void main(){
  vec2 uv = vUv * 2.0 - 1.0;
  uv.x *= uRes.x / uRes.y;
  uv *= uZoom;

  // Rotación global muy suave, sin deformar la galaxia con el tiempo
  float sceneRot = uRot + uTime * uSpeed;
  uv = rot(sceneRot) * uv;

  // Ligera torsión fija para insinuar brazos, pero estable
  float r0 = length(uv);
  float twist = clamp(r0, 0.0, 1.5) * 0.10;
  uv = rot(twist) * uv;

  uv.y += uTilt;

  float r = length(uv);

  vec3 col = vec3(0.01, 0.015, 0.03);

  float band = exp(-pow(abs(uv.y * 0.86 + uv.x * 0.18), 2.0) * 2.3);
  float core = exp(-r * r * 1.55);

  vec2 p = uv * 1.55;
  float dust = fbm(p + fbm(p * 0.55));
  dust = smoothstep(0.32, 0.82, dust);

  float neb = band * (0.18 + 0.82 * dust);

  vec3 nebCol = mix(
    vec3(0.08, 0.12, 0.24),
    vec3(0.38, 0.50, 0.92),
    dust
  );

  nebCol += core * vec3(0.85, 0.72, 0.55) * 0.18;
  col += nebCol * neb;

  // Estrellas de fondo
  vec2 st = uv * 220.0;
  float h = hash21(floor(st));
  float star = smoothstep(0.995, 1.0, h);
  star *= 0.72 + 0.28 * sin(uTime * 1.4 + h * 6.2831);
  col += vec3(1.2, 1.15, 1.05) * star * 1.25;

  // SUPERNOVA ocasional
  float snCycle = 20.0;
  float snId = floor((uTime + 4.0) / snCycle);
  float snT = fract((uTime + 4.0) / snCycle);

  vec2 snSeed = hash21f(snId * 3.17 + 1.73);
  vec2 snPos = vec2(
    mix(-0.60, 0.60, snSeed.x),
    mix(-0.22, 0.22, snSeed.y)
  );

  float snGate = step(0.28, hash11(snId * 1.37));
  float snLife = smoothstep(0.05, 0.13, snT) * (1.0 - smoothstep(0.26, 0.48, snT));
  float snFlash = exp(-pow(snT - 0.10, 2.0) / 0.0015);
  float snRing = ring(uv, snPos, snT * 1.00, 0.022 + snT * 0.03);
  float snCore = glowCircle(uv, snPos, 0.0, 0.035 + snT * 0.08);
  float snHalo = glowCircle(uv, snPos, 0.0, 0.10 + snT * 0.18);

  vec3 snColor = mix(vec3(1.0, 0.86, 0.68), vec3(0.72, 0.86, 1.18), snSeed.x);
  col += snGate * snLife * snColor * snHalo * 0.22;
  col += snGate * snFlash * snColor * snCore * 1.15;
  col += snGate * snLife * snColor * snRing * 0.60;

  // Colisión estelar ocasional
  float colCycle = 26.0;
  float colId = floor((uTime + 9.0) / colCycle);
  float colT = fract((uTime + 9.0) / colCycle);

  vec2 cSeed = hash21f(colId * 5.11 + 8.2);
  float yBand = mix(-0.16, 0.16, cSeed.y);
  vec2 a0 = vec2(-1.00, yBand - 0.06);
  vec2 b0 = vec2( 1.00, yBand + 0.06);

  float tMove = smoothstep(0.08, 0.38, colT);
  vec2 pa = mix(a0, vec2(0.0, yBand), tMove);
  vec2 pb = mix(b0, vec2(0.0, yBand), tMove);

  float collideGate = step(0.36, hash11(colId * 0.93 + 2.0));

  float starA = glowCircle(uv, pa, 0.0, 0.014);
  float starB = glowCircle(uv, pb, 0.0, 0.014);

  float trailA = segmentGlow(uv, a0, pa, 0.010) * 0.25;
  float trailB = segmentGlow(uv, b0, pb, 0.010) * 0.25;

  float impact = exp(-pow(colT - 0.42, 2.0) / 0.0022);
  float shock = ring(uv, vec2(0.0, yBand), max(0.0, (colT - 0.42) * 1.2), 0.018);
  shock *= smoothstep(0.42, 0.47, colT) * (1.0 - smoothstep(0.58, 0.72, colT));

  float impactGlow = glowCircle(uv, vec2(0.0, yBand), 0.0, 0.04 + max(0.0, colT - 0.42) * 0.10);

  col += collideGate * vec3(1.04, 0.96, 0.88) * (starA + starB) * 0.58;
  col += collideGate * vec3(0.70, 0.86, 1.18) * (trailA + trailB) * 0.24;
  col += collideGate * vec3(1.20, 0.96, 0.76) * impact * impactGlow * 1.00;
  col += collideGate * vec3(0.88, 0.95, 1.15) * shock * 0.55;

  float vign = smoothstep(1.22, 0.18, r);
  col *= vign;

  col = 1.0 - exp(-col * 1.22);

  o = vec4(col, 1.0);
}
`;

const prog = program(VS, FS);

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);

const vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(
  gl.ARRAY_BUFFER,
  new Float32Array([-1,-1, 1,-1, -1,1, 1,1]),
  gl.STATIC_DRAW
);

const loc = gl.getAttribLocation(prog, "aPos");
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

const uRes  = gl.getUniformLocation(prog, "uRes");
const uTime = gl.getUniformLocation(prog, "uTime");
const uRot  = gl.getUniformLocation(prog, "uRot");
const uTilt = gl.getUniformLocation(prog, "uTilt");
const uZoom = gl.getUniformLocation(prog, "uZoom");
const uSpeed= gl.getUniformLocation(prog, "uSpeed");

const target = {
  rot: 0,
  tilt: 0,
  zoom: 1,
  speed: 0.015
};

const current = {
  rot: 0,
  tilt: 0,
  zoom: 1,
  speed: 0.015
};

function lerp(a,b,t){ return a + (b-a)*t; }

function bindSlider(id, decimals=2){
  const input = document.getElementById(id);
  const out = document.getElementById(id + "Val");
  out.textContent = Number(input.value).toFixed(decimals);

  input.addEventListener("input", e => {
    target[id] = parseFloat(e.target.value);
    out.textContent = target[id].toFixed(decimals);
  });
}

bindSlider("rot", 2);
bindSlider("speed", 3);
bindSlider("tilt", 2);
bindSlider("zoom", 2);

document.getElementById("uiToggle").onclick = () => {
  const p = document.getElementById("panel");
  p.style.display = (p.style.display === "block") ? "none" : "block";
};

let t0 = performance.now();

function frame(now){
  const t = (now - t0) / 1000;

  current.rot   = lerp(current.rot,   target.rot,   0.08);
  current.tilt  = lerp(current.tilt,  target.tilt,  0.08);
  current.zoom  = lerp(current.zoom,  target.zoom,  0.08);
  current.speed = lerp(current.speed, target.speed, 0.05);

  gl.useProgram(prog);
  gl.bindVertexArray(vao);

  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, t);
  gl.uniform1f(uRot, current.rot);
  gl.uniform1f(uTilt, current.tilt);
  gl.uniform1f(uZoom, current.zoom);
  gl.uniform1f(uSpeed, current.speed);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);

})();
</script>

</body>
</html>
